services:
  midden:
    build: .
    ports:
      - "8080:8080"
    environment:
      MIDDEN__SERVER__BIND: "0.0.0.0:8080"
      MIDDEN__SERVER__PUBLIC_BASE_URL: "http://127.0.0.1:8080"
      MIDDEN__DATABASE__URL: "sqlite:///var/lib/midden/midden.db?mode=rwc"
      MIDDEN__STORAGE__LOCAL__PATH: "/var/lib/midden/blobs"
    volumes:
      - midden-data:/var/lib/midden

  postgres:
    image: postgres:17
    profiles: ["postgres"]
    environment:
      POSTGRES_USER: midden
      POSTGRES_PASSWORD: midden
      POSTGRES_DB: midden
    volumes:
      - midden-postgres:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    profiles: ["s3"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: midden
      MINIO_ROOT_PASSWORD: midden-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - midden-minio:/data

volumes:
  midden-data:
  midden-postgres:
  midden-minio:
