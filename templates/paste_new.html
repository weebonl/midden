{% extends "base.html" %}
{% block title %}New Paste | {{ settings.branding.instance_name }}{% endblock %}
{% block content %}
  <h2>New paste</h2>
  <form method="post" action="/p/new">
    <p><label>Title<br><input name="title" maxlength="120"></label></p>
    <p><label>Syntax<br><input name="syntax" placeholder="rust, text, js"></label></p>
    <p><label>Expire after, optional<br><input name="expires" list="expiry-presets" value="{{ settings.limits.default_paste_expiry or "" }}" placeholder="never, 12h, 7d"></label></p>
    {% if settings.features.public_browse %}
      <p><label>Visibility<br><select name="visibility"><option value="unlisted">unlisted</option><option value="public">public browse</option></select></label></p>
    {% endif %}
    <p><label>Text<br><textarea name="content" required rows="18"></textarea></label></p>
    <p><button type="submit">Create paste</button></p>
  </form>
{% endblock %}
