{% extends "base.html" %}
{% block title %}Resumable upload | {{ settings.branding.instance_name }}{% endblock %}
{% block content %}
  <h2>Resumable upload</h2>
  <p>Uploads up to {{ page.max_upload }} are allowed.</p>
  <form method="post" action="/tus" data-tus-form>
    <label class="drop-zone">
      <input type="file" name="file" required>
      <span>Select a large file</span>
    </label>
    <p><label>Expire after, optional<br><input name="expires" list="expiry-presets" value="{{ settings.limits.default_file_expiry or "" }}" placeholder="never, 12h, 7d"></label></p>
    {% if settings.features.public_browse %}
      <p><label>Visibility<br><select name="visibility"><option value="unlisted">unlisted</option><option value="public">public browse</option></select></label></p>
    {% endif %}
    <p><button type="submit">Start upload</button></p>
    <progress class="upload-progress" max="100" value="0" hidden data-tus-progress></progress>
    <p class="notice" hidden data-tus-status></p>
  </form>
{% endblock %}
