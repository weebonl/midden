{% extends "base.html" %}
{% block title %}Set Password | {{ settings.branding.instance_name }}{% endblock %}
{% block content %}
  <h2>Set password</h2>
  <form method="post" action="/auth/password-reset/{{ page.token }}">
    {% include "csrf_field.html" %}
    <p><label>New password<br><input type="password" name="password" autocomplete="new-password" required></label></p>
    <p><button type="submit">Set password</button></p>
  </form>
{% endblock %}
