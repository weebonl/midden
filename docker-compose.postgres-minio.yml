services:
  midden:
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      MIDDEN__DATABASE__URL: "postgres://midden:midden@postgres:5432/midden"
      MIDDEN__STORAGE__BACKEND: "s3"
      MIDDEN__STORAGE__S3__BUCKET: "midden"
      MIDDEN__STORAGE__S3__REGION: "us-east-1"
      MIDDEN__STORAGE__S3__ENDPOINT: "http://minio:9000"
      MIDDEN__STORAGE__S3__ACCESS_KEY_ID: "midden"
      MIDDEN__STORAGE__S3__SECRET_ACCESS_KEY: "midden-secret"
      MIDDEN__STORAGE__S3__ALLOW_HTTP: "true"

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: midden
      POSTGRES_PASSWORD: midden
      POSTGRES_DB: midden
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U midden -d midden"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - midden-postgres:/var/lib/postgresql/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: midden
      MINIO_ROOT_PASSWORD: midden-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - midden-minio:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -eu -c "
      attempts=0;
      until mc alias set local http://minio:9000 midden midden-secret; do
        attempts=$$((attempts + 1));
        if [ $$attempts -ge 60 ]; then exit 1; fi;
        sleep 2;
      done;
      mc mb --ignore-existing local/midden;
      mc stat local/midden;
      "

volumes:
  midden-postgres:
  midden-minio:
