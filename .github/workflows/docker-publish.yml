name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - .github/workflows/**
      - Dockerfile
      - .dockerignore
      - src/**
      - static/**
      - templates/**
      - Cargo.toml
      - Cargo.lock
      - rust-toolchain.toml
      - midden.example.toml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/**
      - Dockerfile
      - .dockerignore
      - src/**
      - static/**
      - templates/**
      - Cargo.toml
      - Cargo.lock
      - rust-toolchain.toml
      - midden.example.toml

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-amd64:
    name: Build linux/amd64
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=

      - name: Build image for PR
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          push: false
          tags: |
            ${{ steps.meta.outputs.tags }}
            midden:smoke-amd64
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=midden-amd64

      - name: Smoke-test the image default command
        if: github.event_name == 'pull_request'
        run: |
          docker run --detach --name midden-smoke --publish 18080:8080 midden:smoke-amd64
          for _ in $(seq 1 30); do
            status="$(docker inspect --format '{{.State.Health.Status}}' midden-smoke)"
            if [ "$status" = healthy ]; then
              curl --fail --silent --show-error http://127.0.0.1:18080/healthz
              exit 0
            fi
            if [ "$status" = unhealthy ]; then
              break
            fi
            sleep 2
          done
          docker logs midden-smoke
          exit 1

      - name: Remove smoke-test container
        if: always() && github.event_name == 'pull_request'
        run: docker rm --force midden-smoke || true

      - name: Build and push image by digest
        if: github.event_name != 'pull_request'
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=midden-amd64
          cache-to: type=gha,mode=max,scope=midden-amd64

      - name: Export digest
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: digests-amd64
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  build-arm64:
    name: Build linux/arm64
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=

      - name: Build image for PR
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=midden-arm64

      - name: Build and push image by digest
        if: github.event_name != 'pull_request'
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=midden-arm64
          cache-to: type=gha,mode=max,scope=midden-arm64

      - name: Export digest
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: digests-arm64
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Publish multi-arch manifest
    runs-on: ubuntu-24.04
    needs:
      - build-amd64
      - build-arm64
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,prefix=

      - name: Create and push manifest list
        working-directory: /tmp/digests
        env:
          METADATA_JSON: ${{ steps.meta.outputs.json }}
        run: |
          mapfile -t tags < <(jq -r '.tags[]' <<< "$METADATA_JSON")
          tag_args=()
          for tag in "${tags[@]}"; do
            tag_args+=("-t" "$tag")
          done
          sources=()
          for digest in *; do
            sources+=("${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:$digest")
          done
          docker buildx imagetools create "${tag_args[@]}" "${sources[@]}"

      - name: Inspect image
        env:
          METADATA_JSON: ${{ steps.meta.outputs.json }}
        run: |
          docker buildx imagetools inspect "$(jq -r '.tags[0]' <<< "$METADATA_JSON")"
